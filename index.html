
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GymFit Pro - Sistem Manajemen Gym & Fitness</title>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0b0f1c;
            color: #eef2ff;
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .login-card p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 28px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .btn-login {
            width: 100%;
            background: #f97316;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-login:hover {
            background: #ea580c;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .register-link a {
            color: #f97316;
            text-decoration: none;
            cursor: pointer;
        }

        /* Main App (setelah login) */
        .app-container {
            display: none;
        }
        .sidebar {
            width: 280px;
            background: #0f172a;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            border-right: 1px solid #1e293b;
            transition: 0.3s;
            z-index: 100;
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #1e293b;
        }
        .sidebar-header h3 {
            font-weight: 800;
            font-size: 22px;
        }
        .sidebar-header span {
            font-size: 12px;
            color: #f97316;
        }
        .nav-menu {
            padding: 20px 0;
        }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: #cbd5e1;
        }
        .nav-item i {
            width: 24px;
        }
        .nav-item:hover, .nav-item.active {
            background: #1e293b;
            color: #f97316;
        }
        .main-content {
            margin-left: 280px;
            padding: 24px 32px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            background: #0f172a;
            padding: 12px 24px;
            border-radius: 48px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logout-btn {
            background: #dc2626;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }
        .card-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #334155;
        }
        button {
            background: #f97316;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        button.secondary {
            background: #334155;
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .form-row input, .form-row select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 20px;
            color: white;
            flex: 1;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #0f172a;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #f97316;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
        }
        .badge-success {
            background: #22c55e;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-block;
        }
        .badge-pending {
            background: #eab308;
            color: black;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-block;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 32px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
        }
    </style>
</head>
<body>
<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
    <div class="login-card">
        <h2><i class="fas fa-dumbbell"></i> GymFit Pro</h2>
        <p>Login Admin / Member</p>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="admin / ahmad">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="******">
        </div>
        <div class="input-group">
            <label>Login Sebagai</label>
            <select id="loginRole">
                <option value="admin">Admin</option>
                <option value="member">Member</option>
            </select>
        </div>
        <button class="btn-login" id="doLoginBtn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
        <div class="register-link">Belum punya akun member? <a id="showRegisterBtn">Daftar Sekarang</a></div>
        <div class="register-link" style="font-size:12px; margin-top:10px;">Demo: admin/admin123 | ahmad/123</div>
    </div>
</div>

<!-- MODAL REGISTRASI -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-user-plus"></i> Pendaftaran Member</h3>
        <div class="input-group"><input type="text" id="regName" placeholder="Nama Lengkap"></div>
        <div class="input-group"><input type="text" id="regUsername" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="regPassword" placeholder="Password"></div>
        <div class="input-group"><input type="email" id="regEmail" placeholder="Email"></div>
        <div class="input-group">
            <select id="regPackage">
                <option value="Basic">Basic - Rp150.000/bln</option>
                <option value="Gold">Gold - Rp300.000/bln</option>
                <option value="Platinum">Platinum - Rp500.000/bln</option>
            </select>
        </div>
        <button id="doRegisterBtn" class="btn-login">Daftar</button>
        <button id="closeRegisterBtn" class="btn-login" style="background:#475569; margin-top:8px;">Batal</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="appContainer" class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>GYMFIT PRO</h3>
            <span>Manajemen Fitness</span>
        </div>
        <div class="nav-menu" id="navMenu"></div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div><i class="fas fa-bars" id="menuToggle" style="cursor:pointer;"></i> <span id="pageTitle">Dashboard</span></div>
            <div class="user-info"><span id="userDisplay"></span> <div class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</div></div>
        </div>
        <div id="contentArea"></div>
    </div>
</div>

<script>
    // ---------- INITIAL DATA ----------
    let gymData = {
        members: [],
        trainers: [],
        schedules: [],
        payments: [],
        attendances: []
    };

    function generateId(arr) { return arr.length ? Math.max(...arr.map(i=>i.id)) + 1 : 1; }

    function saveData() {
        localStorage.setItem('gymfit_data', JSON.stringify(gymData));
    }

    function loadData() {
        const stored = localStorage.getItem('gymfit_data');
        if(stored) {
            gymData = JSON.parse(stored);
        } else {
            // Data default
            gymData.members = [
                { id: 1, name: "Ahmad Fitness", username: "ahmad", password: "123", email: "ahmad@mail.com", package: "Gold", statusPayment: "active", joinDate: "2025-01-10" },
                { id: 2, name: "Siti Sehat", username: "siti", password: "123", email: "siti@mail.com", package: "Basic", statusPayment: "pending", joinDate: "2025-02-01" }
            ];
            gymData.trainers = [
                { id: 1, name: "Coach Alex", expertise: "Bodybuilding", phone: "08123456789" },
                { id: 2, name: "Coach Bella", expertise: "Yoga & Pilates", phone: "08129876543" }
            ];
            gymData.schedules = [
                { id: 1, day: "Senin", time: "07:00 - 08:30", trainerName: "Coach Alex", className: "HIIT Training" },
                { id: 2, day: "Rabu", time: "16:00 - 17:30", trainerName: "Coach Bella", className: "Yoga Flow" },
                { id: 3, day: "Jumat", time: "18:00 - 19:30", trainerName: "Coach Alex", className: "Strength Class" }
            ];
            gymData.payments = [
                { id: 1, memberId: 1, amount: 300000, package: "Gold", status: "confirmed", date: "2025-01-05" },
                { id: 2, memberId: 2, amount: 150000, package: "Basic", status: "pending", date: "2025-02-01" }
            ];
            gymData.attendances = [
                { id: 1, memberId: 1, date: "2025-02-10", checkinTime: "08:15" },
                { id: 2, memberId: 1, date: "2025-02-12", checkinTime: "17:30" }
            ];
            saveData();
        }
    }

    let currentUser = null;  // { role, id, username, name }
    let currentNav = 'dashboard';

    // RENDER APP
    function renderApp() {
        if(!currentUser) return;
        const navMenu = document.getElementById('navMenu');
        let menuItems = [];
        if(currentUser.role === 'admin') {
            menuItems = [
                { id: 'dashboard', icon: 'fa-chart-line', label: 'Dashboard Statistik' },
                { id: 'members', icon: 'fa-users', label: 'Data Member' },
                { id: 'trainers', icon: 'fa-chalkboard-user', label: 'Data Pelatih' },
                { id: 'schedules', icon: 'fa-calendar-alt', label: 'Jadwal Latihan' },
                { id: 'packages', icon: 'fa-tags', label: 'Paket Membership' },
                { id: 'payments', icon: 'fa-credit-card', label: 'Verifikasi Pembayaran' },
                { id: 'attendance', icon: 'fa-fingerprint', label: 'Absensi Member' },
                { id: 'reports', icon: 'fa-file-alt', label: 'Laporan Keanggotaan' }
            ];
        } else {
            menuItems = [
                { id: 'dashboard', icon: 'fa-chart-simple', label: 'Dashboard Saya' },
                { id: 'mySchedule', icon: 'fa-dumbbell', label: 'Jadwal Latihan' },
                { id: 'myMembership', icon: 'fa-id-card', label: 'Paket & Pembayaran' },
                { id: 'attendanceMember', icon: 'fa-check-circle', label: 'Absensi Hari Ini' }
            ];
        }
        navMenu.innerHTML = menuItems.map(item => `<div class="nav-item ${currentNav === item.id ? 'active' : ''}" data-nav="${item.id}"><i class="fas ${item.icon}"></i> ${item.label}</div>`).join('');
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => {
                currentNav = el.dataset.nav;
                renderApp();
            });
        });
        const content = document.getElementById('contentArea');
        if(currentUser.role === 'admin') renderAdminContent(content);
        else renderMemberContent(content);
        document.getElementById('userDisplay').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.name || currentUser.username}`;
        document.getElementById('pageTitle').innerText = menuItems.find(i=>i.id===currentNav)?.label || 'Dashboard';
    }

    // ==================== ADMIN RENDER ====================
    function renderAdminContent(container) {
        if(currentNav === 'dashboard') renderAdminDashboard(container);
        else if(currentNav === 'members') renderMemberManagement(container);
        else if(currentNav === 'trainers') renderTrainerManagement(container);
        else if(currentNav === 'schedules') renderScheduleManagement(container);
        else if(currentNav === 'packages') renderPackageManagement(container);
        else if(currentNav === 'payments') renderPaymentVerification(container);
        else if(currentNav === 'attendance') renderAttendanceReport(container);
        else if(currentNav === 'reports') renderReports(container);
        else container.innerHTML = '<div class="card">Fitur sedang dikembangkan</div>';
    }

    function renderAdminDashboard(container) {
        const totalMembers = gymData.members.length;
        const activeMembers = gymData.members.filter(m => m.statusPayment === 'active').length;
        const totalPayments = gymData.payments.filter(p => p.status === 'confirmed').reduce((sum,p)=>sum+p.amount,0);
        const attendanceThisMonth = gymData.attendances.filter(a => a.date.startsWith(new Date().toISOString().slice(0,7))).length;
        container.innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${totalMembers}</div><div>Total Member</div></div>
                <div class="stat-card"><div class="stat-number">${activeMembers}</div><div>Member Aktif</div></div>
                <div class="stat-card"><div class="stat-number">Rp ${totalPayments.toLocaleString()}</div><div>Pendapatan</div></div>
                <div class="stat-card"><div class="stat-number">${attendanceThisMonth}</div><div>Absensi Bulan Ini</div></div>
            </div>
            <div class="card"><canvas id="memberChart" width="400" height="200"></canvas></div>
            <div class="card"><h4>Statistik Kehadiran per Bulan</h4><canvas id="attendanceChart"></canvas></div>
        `;
        const packages = ['Basic','Gold','Platinum'];
        const counts = packages.map(p => gymData.members.filter(m => m.package === p).length);
        new Chart(document.getElementById('memberChart'), { type: 'bar', data: { labels: packages, datasets: [{ label: 'Jumlah Member', data: counts, backgroundColor: '#f97316' }] } });
        const months = [];
        const attendCounts = [];
        for(let i=5;i>=0;i--) {
            let d = new Date(); d.setMonth(d.getMonth()-i);
            let month = d.toISOString().slice(0,7);
            months.push(month);
            attendCounts.push(gymData.attendances.filter(a => a.date.startsWith(month)).length);
        }
        new Chart(document.getElementById('attendanceChart'), { type: 'line', data: { labels: months, datasets: [{ label: 'Kehadiran', data: attendCounts, borderColor: '#f97316' }] } });
    }

    function renderMemberManagement(container) {
        container.innerHTML = `<div class="card"><div class="card-header">Data Member <button id="addMemberBtn">+ Tambah Member</button></div><table>
            <thead><tr><th>Nama</th><th>Username</th><th>Paket</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody>${gymData.members.map(m => `<tr><td>${m.name}</td><td>${m.username}</td><td>${m.package}</td><td><span class="badge-${m.statusPayment === 'active' ? 'success' : 'pending'}">${m.statusPayment}</span></td><td><button class="editMember" data-id="${m.id}">Ubah Status</button></td></tr>`).join('')}</tbody>
        </table></div>`;
        document.getElementById('addMemberBtn')?.addEventListener('click', () => alert("Silakan member daftar via halaman registrasi."));
        document.querySelectorAll('.editMember').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = parseInt(btn.dataset.id);
                let member = gymData.members.find(m=>m.id===id);
                member.statusPayment = member.statusPayment === 'active' ? 'pending' : 'active';
                saveData();
                renderMemberManagement(container);
            });
        });
    }

    function renderTrainerManagement(container) {
        container.innerHTML = `<div class="card"><div class="card-header">Data Pelatih <button id="newTrainerBtn">Tambah Pelatih</button></div>表
            <thead><tr><th>Nama</th><th>Keahlian</th><th>Telepon</th><th>Aksi</th></tr></thead>
            <tbody>${gymData.trainers.map(t => `<tr><td>${t.name}</td><td>${t.expertise}</td><td>${t.phone}</td><td><button class="delTrainer" data-id="${t.id}">Hapus</button></td></tr>`).join('')}</tbody>
        </table></div>`;
        document.getElementById('newTrainerBtn')?.addEventListener('click', () => {
            let name = prompt("Nama pelatih");
            let expertise = prompt("Keahlian");
            let phone = prompt("No HP");
            if(name && expertise) {
                gymData.trainers.push({ id: generateId(gymData.trainers), name, expertise, phone });
                saveData();
                renderTrainerManagement(container);
            }
        });
        document.querySelectorAll('.delTrainer').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = parseInt(btn.dataset.id);
                gymData.trainers = gymData.trainers.filter(t=>t.id!==id);
                saveData();
                renderTrainerManagement(container);
            });
        });
    }

    function renderScheduleManagement(container) {
        container.innerHTML = `<div class="card"><div class="card-header">Jadwal Latihan <button id="addScheduleBtn">+ Jadwal</button></div>表
            <thead><tr><th>Hari</th><th>Jam</th><th>Kelas</th><th>Pelatih</th><th>Aksi</th></tr></thead>
            <tbody>${gymData.schedules.map(s => `<tr><td>${s.day}</td><td>${s.time}</td><td>${s.className}</td><td>${s.trainerName}</td><td><button class="delSchedule" data-id="${s.id}">Hapus</button></td></tr>`).join('')}</tbody>
        </table></div>`;
        document.getElementById('addScheduleBtn')?.addEventListener('click', () => {
            let day = prompt("Hari (Senin/Minggu)");
            let time = prompt("Jam (cth: 08:00 - 09:30)");
            let className = prompt("Nama Kelas");
            let trainerName = prompt("Nama Pelatih");
            if(day && time) {
                gymData.schedules.push({ id: generateId(gymData.schedules), day, time, className, trainerName });
                saveData();
                renderScheduleManagement(container);
            }
        });
        document.querySelectorAll('.delSchedule').forEach(btn => {
            btn.addEventListener('click', () => {
                gymData.schedules = gymData.schedules.filter(s=>s.id != btn.dataset.id);
                saveData();
                renderScheduleManagement(container);
            });
        });
    }

    function renderPackageManagement(container) {
        const packages = [{ name: 'Basic', price: 150000 }, { name: 'Gold', price: 300000 }, { name: 'Platinum', price: 500000 }];
        container.innerHTML = `<div class="card"><div class="card-header">Paket Membership</div>表
            <thead><tr><th>Paket</th><th>Harga/Bulan</th><th>Fitur</th></tr></thead>
            <tbody>${packages.map(p => `<tr><td>${p.name}</td><td>Rp ${p.price.toLocaleString()}</td><td>${p.name==='Basic'?'Akses dasar':'Akses penuh + trainer'}</td></tr>`).join('')}</tbody>
        </table><button id="updatePriceBtn" class="secondary">Update Harga (Demo)</button></div>`;
        document.getElementById('updatePriceBtn')?.addEventListener('click', () => alert("Fitur update harga dapat dikembangkan lebih lanjut."));
    }

    function renderPaymentVerification(container) {
        let pending = gymData.payments.filter(p => p.status === 'pending');
        container.innerHTML = `<div class="card"><div class="card-header">Konfirmasi Pembayaran</div>表
            <thead><tr><th>Member</th><th>Paket</th><th>Jumlah</th><th>Tanggal</th><th>Aksi</th></tr></thead>
            <tbody>${pending.map(p => {
                let member = gymData.members.find(m=>m.id===p.memberId);
                return `<tr><td>${member?.name || '-'}</td><td>${p.package}</td><td>Rp ${p.amount.toLocaleString()}</td><td>${p.date}</td><td><button class="confirmPay" data-id="${p.id}">Konfirmasi</button></td></tr>`;
            }).join('')}</tbody>
        </table></div>`;
        document.querySelectorAll('.confirmPay').forEach(btn => {
            btn.addEventListener('click', () => {
                let payId = parseInt(btn.dataset.id);
                let payment = gymData.payments.find(p=>p.id===payId);
                if(payment) {
                    payment.status = 'confirmed';
                    let member = gymData.members.find(m=>m.id===payment.memberId);
                    if(member) member.statusPayment = 'active';
                    saveData();
                    renderPaymentVerification(container);
                }
            });
        });
    }

    function renderAttendanceReport(container) {
        let records = gymData.attendances.map(a => {
            let member = gymData.members.find(m=>m.id===a.memberId);
            return `<tr><td>${member?.name || '-'}</td><td>${a.date}</td><td>${a.checkinTime}</td></tr>`;
        }).join('');
        container.innerHTML = `<div class="card"><div class="card-header">Riwayat Absensi Member</div>表
            <thead><tr><th>Member</th><th>Tanggal</th><th>Jam Check-in</th></tr></thead>
            <tbody>${records || '<tr><td colspan="3">Belum ada absensi</td></tr>'}</tbody>
        </table></div>`;
    }

    function renderReports(container) {
        let active = gymData.members.filter(m=>m.statusPayment==='active').length;
        let income = gymData.payments.filter(p=>p.status==='confirmed').reduce((a,b)=>a+b.amount,0);
        container.innerHTML = `<div class="card"><h3>Laporan Keanggotaan</h3><p>Total Member Terdaftar: ${gymData.members.length}</p><p>Member Aktif: ${active}</p><p>Total Pendapatan Terkonfirmasi: Rp ${income.toLocaleString()}</p><p>Total Kehadiran Seluruh Waktu: ${gymData.attendances.length}</p><button id="exportReportBtn">Export Laporan (Simulasi)</button></div>`;
        document.getElementById('exportReportBtn')?.addEventListener('click', () => alert("Fitur export laporan siap digunakan."));
    }

    // ==================== MEMBER RENDER ====================
    function renderMemberContent(container) {
        if(currentNav === 'dashboard') renderMemberDashboard(container);
        else if(currentNav === 'mySchedule') renderMemberSchedule(container);
        else if(currentNav === 'myMembership') renderMemberMembership(container);
        else if(currentNav === 'attendanceMember') renderMemberAttendance(container);
    }

    function renderMemberDashboard(container) {
        const member = gymData.members.find(m=>m.id === currentUser.id);
        let attendanceCount = gymData.attendances.filter(a=>a.memberId===currentUser.id).length;
        container.innerHTML = `<div class="card"><h3>Selamat Datang, ${member?.name}</h3><p>Paket: ${member?.package} | Status: <span class="badge-${member?.statusPayment === 'active' ? 'success' : 'pending'}">${member?.statusPayment}</span></p><p>Total kehadiran Anda: ${attendanceCount} kali</p></div><div class="card"><h4>Pengumuman</h4><p>Jaga kesehatan dan tetap semangat latihan!</p></div>`;
    }
    function renderMemberSchedule(container) {
        container.innerHTML = `<div class="card"><div class="card-header">Jadwal Latihan Gym</div>表
            <thead><tr><th>Hari</th><th>Jam</th><th>Kelas</th><th>Pelatih</th></tr></thead>
            <tbody>${gymData.schedules.map(s => `<tr><td>${s.day}</td><td>${s.time}</td><td>${s.className}</td><td>${s.trainerName}</td></tr>`).join('')}</tbody>
        </table></div>`;
    }
    function renderMemberMembership(container) {
        const member = gymData.members.find(m=>m.id===currentUser.id);
        container.innerHTML = `<div class="card"><h3>Paket Anda: ${member?.package}</h3><p>Status Pembayaran: <span class="badge-${member?.statusPayment === 'active' ? 'success' : 'pending'}">${member?.statusPayment}</span></p><button id="payNowBtn">Lakukan Pembayaran (Simulasi)</button></div>`;
        document.getElementById('payNowBtn')?.addEventListener('click', () => {
            let amount = member.package === 'Basic' ? 150000 : (member.package === 'Gold' ? 300000 : 500000);
            let newPayment = { id: generateId(gymData.payments), memberId: member.id, amount, package: member.package, status: 'pending', date: new Date().toISOString().slice(0,10) };
            gymData.payments.push(newPayment);
            member.statusPayment = 'pending';
            saveData();
            alert("Pembayaran pending, silahkan menunggu konfirmasi admin.");
            renderMemberMembership(container);
        });
    }
    function renderMemberAttendance(container) {
        container.innerHTML = `<div class="card"><h3>Absensi Hari Ini</h3><button id="checkinBtn">Check-in Sekarang</button><div id="attendanceMsg"></div><h4>Riwayat Absensi Anda</h4>表
            <thead><tr><th>Tanggal</th><th>Jam</th></tr></thead>
            <tbody>${gymData.attendances.filter(a=>a.memberId===currentUser.id).map(a=>`<tr><td>${a.date}</td><td>${a.checkinTime}</td></tr>`).join('')}</tbody>
        </table></div>`;
        document.getElementById('checkinBtn')?.addEventListener('click', () => {
            let today = new Date().toISOString().slice(0,10);
            let already = gymData.attendances.some(a => a.memberId === currentUser.id && a.date === today);
            if(already) { document.getElementById('attendanceMsg').innerText = "Anda sudah absen hari ini!"; return; }
            let now = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            gymData.attendances.push({ id: generateId(gymData.attendances), memberId: currentUser.id, date: today, checkinTime: now });
            saveData();
            document.getElementById('attendanceMsg').innerHTML = "✅ Absen berhasil! Selamat berolahraga.";
            renderMemberAttendance(container);
        });
    }

    // ==================== AUTHENTICATION ====================
    function login(username, password, role) {
        if(role === 'admin') {
            if(username === 'admin' && password === 'admin123') {
                currentUser = { role: 'admin', username: 'admin', name: 'Administrator' };
                return true;
            }
        } else {
            let member = gymData.members.find(m => m.username === username && m.password === password);
            if(member) {
                currentUser = { role: 'member', id: member.id, username: member.username, name: member.name };
                return true;
            }
        }
        return false;
    }

    function registerMember(name, username, password, email, pkg) {
        if(gymData.members.some(m => m.username === username)) return false;
        let newId = generateId(gymData.members);
        let newMember = {
            id: newId,
            name, username, password, email,
            package: pkg,
            statusPayment: 'pending',
            joinDate: new Date().toISOString().slice(0,10)
        };
        gymData.members.push(newMember);
        let amount = pkg === 'Basic' ? 150000 : (pkg === 'Gold' ? 300000 : 500000);
        gymData.payments.push({
            id: generateId(gymData.payments),
            memberId: newId,
            amount,
            package: pkg,
            status: 'pending',
            date: new Date().toISOString().slice(0,10)
        });
        saveData();
        return true;
    }

    // EVENT LISTENERS
    document.getElementById('doLoginBtn').addEventListener('click', () => {
        let uname = document.getElementById('loginUsername').value.trim();
        let pass = document.getElementById('loginPassword').value.trim();
        let role = document.getElementById('loginRole').value;
        if(login(uname, pass, role)) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            renderApp();
        } else {
            alert("Login gagal! Periksa username/password.\nAdmin: admin/admin123\nMember: ahmad/123");
        }
    });

    document.getElementById('showRegisterBtn').addEventListener('click', () => {
        document.getElementById('registerModal').style.display = 'flex';
    });
    document.getElementById('closeRegisterBtn').addEventListener('click', () => {
        document.getElementById('registerModal').style.display = 'none';
    });
    document.getElementById('doRegisterBtn').addEventListener('click', () => {
        let name = document.getElementById('regName').value.trim();
        let uname = document.getElementById('regUsername').value.trim();
        let pass = document.getElementById('regPassword').value.trim();
        let email = document.getElementById('regEmail').value.trim();
        let pkg = document.getElementById('regPackage').value;
        if(!name || !uname || !pass || !email || !pkg) {
            alert("Harap isi semua data!");
            return;
        }
        if(registerMember(name, uname, pass, email, pkg)) {
            alert("Pendaftaran berhasil! Silakan login dengan akun baru Anda.");
            document.getElementById('registerModal').style.display = 'none';
            document.getElementById('loginUsername').value = uname;
            document.getElementById('loginPassword').value = pass;
            document.getElementById('loginRole').value = 'member';
        } else {
            alert("Username sudah terdaftar, gunakan username lain.");
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentUser = null;
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
    });
    document.getElementById('menuToggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    // INIT
    loadData();
    // Tampilkan halaman login (sudah tampil default)
</script>
</body>
</html>
