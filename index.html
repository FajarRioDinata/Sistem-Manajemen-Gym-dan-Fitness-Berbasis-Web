
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GymFit Pro | Manajemen Gym Modern</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter & Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1c, #03060c);
            font-family: 'Inter', sans-serif;
            color: #f0f3f8;
            padding: 24px;
            min-height: 100vh;
        }

        /* Glassmorphism container */
        .app-wrapper {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Navbar modern */
        .navbar {
            background: rgba(18, 25, 40, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            border: 1px solid rgba(72, 187, 120, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .logo h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #86efac);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
        }
        .logo p {
            font-size: 12px;
            color: #9ca3af;
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-family: inherit;
        }
        .btn-outline {
            border: 1px solid #4b5563;
            color: #e5e7eb;
            background: rgba(0,0,0,0.3);
        }
        .btn-outline:hover {
            background: #374151;
        }
        .btn-primary {
            background: #22c55e;
            color: #0a0f1c;
            box-shadow: 0 4px 12px rgba(34,197,94,0.3);
        }
        .btn-primary:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .card {
            background: rgba(20, 28, 38, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(72, 187, 120, 0.2);
            transition: transform 0.2s;
        }
        .card:hover {
            border-color: rgba(34,197,94,0.5);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(34,197,94,0.3);
        }
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #86efac;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            font-size: 13px;
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
            color: #cbd5e1;
        }
        input, select, textarea {
            width: 100%;
            background: #0f141c;
            border: 1px solid #2d3a4a;
            padding: 12px 16px;
            border-radius: 28px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus {
            border-color: #22c55e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #2d3a4a;
        }
        .badge {
            background: #22c55e20;
            color: #86efac;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 12px;
        }
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        .tab-btn {
            background: #1e2a3a;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab-btn.active {
            background: #22c55e;
            color: #0a0f1c;
        }
        .hidden {
            display: none;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a232f;
            max-width: 450px;
            width: 90%;
            border-radius: 40px;
            padding: 28px;
            border: 1px solid #22c55e;
        }
        .qris-box {
            text-align: center;
            background: #0f141c;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }
        footer {
            text-align: center;
            font-size: 12px;
            margin-top: 40px;
            color: #6c757d;
        }
        @media (max-width: 700px) {
            body { padding: 16px; }
            .navbar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="app">
    <div class="navbar">
        <div class="logo">
            <h2><i class="fas fa-dumbbell"></i> GymFit Pro</h2>
            <p>Manajemen Gym & Fitness Modern</p>
        </div>
        <div id="authSection" class="auth-buttons"></div>
    </div>
    <div id="mainContent"></div>
    <footer>© 2025 GymFit Pro • Sistem Pembayaran QRIS / Cash</footer>
</div>

<script>
    // ---------- DATA STORE (localStorage) ----------
    let gymData = {
        users: [
            { id: 1, username: "admin", password: "admin123", role: "admin", name: "Admin Utama", email: "admin@gymfit.com", phone: "08123456789", membership: null, expireDate: null, status: "active" },
            { id: 2, username: "member1", password: "member123", role: "member", name: "Budi Santoso", email: "budi@mail.com", phone: "085123456", membership: "bulanan", expireDate: "2025-07-20", status: "active" }
        ],
        trainers: [
            { id: 1, name: "Andi Fitra", expertise: "Bodybuilding", schedule: "Senin & Rabu 10-12", phone: "081234567" },
            { id: 2, name: "Siti Zubaidah", expertise: "Yoga & Pilates", schedule: "Selasa & Kamis 15-17", phone: "081987654" }
        ],
        schedules: [
            { id: 1, day: "Senin", time: "08:00 - 10:00", className: "Cardio Blast", trainer: "Andi Fitra" },
            { id: 2, day: "Selasa", time: "16:00 - 18:00", className: "Yoga Flow", trainer: "Siti Zubaidah" },
            { id: 3, day: "Rabu", time: "19:00 - 21:00", className: "Strength Training", trainer: "Andi Fitra" },
            { id: 4, day: "Kamis", time: "10:00 - 12:00", className: "Zumba", trainer: "Rudi" },
            { id: 5, day: "Jumat", time: "14:00 - 16:00", className: "HIIT", trainer: "Cahyo" },
            { id: 6, day: "Sabtu", time: "09:00 - 11:00", className: "Full Body", trainer: "Andi Fitra" }
        ],
        packages: [
            { id: "bulanan", name: "Bulanan", price: 350000, days: 30 },
            { id: "3bulan", name: "3 Bulan", price: 900000, days: 90 },
            { id: "tahunan", name: "Tahunan", price: 3200000, days: 365 }
        ],
        payments: [
            { id: 1, userId: 2, amount: 350000, packageId: "bulanan", date: "2025-06-15", method: "qris", status: "success" }
        ],
        attendances: [
            { id: 1, userId: 2, date: "2025-06-18", checkinTime: "09:30" }
        ]
    };

    let currentUser = null;

    // Helper save/load
    function saveData() { localStorage.setItem("gymfit_modern", JSON.stringify(gymData)); }
    function loadData() {
        const stored = localStorage.getItem("gymfit_modern");
        if(stored) gymData = JSON.parse(stored);
        else saveData();
    }

    // ---------- AUTH ----------
    function login(username, password) {
        const user = gymData.users.find(u => u.username === username && u.password === password);
        if(user) {
            currentUser = { id: user.id, username: user.username, role: user.role, name: user.name };
            return true;
        }
        return false;
    }
    function logout() { currentUser = null; renderApp(); }
    function registerMember(username, password, name, email, phone) {
        if(gymData.users.find(u => u.username === username)) return false;
        const newId = gymData.users.length + 1;
        gymData.users.push({ id: newId, username, password, role: "member", name, email, phone, membership: null, expireDate: null, status: "active" });
        saveData();
        return true;
    }

    // Render utama
    function renderApp() {
        const authDiv = document.getElementById("authSection");
        const mainDiv = document.getElementById("mainContent");
        if(!currentUser) {
            authDiv.innerHTML = `<button class="btn btn-outline" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
                                 <button class="btn btn-primary" id="registerBtn"><i class="fas fa-user-plus"></i> Daftar Member</button>`;
            mainDiv.innerHTML = renderPublicPage();
            document.getElementById("loginBtn")?.addEventListener("click", showLoginModal);
            document.getElementById("registerBtn")?.addEventListener("click", showRegisterModal);
        } else {
            authDiv.innerHTML = `<span style="background:#1e2a3a; padding:8px 18px; border-radius:40px;"><i class="fas fa-user-circle"></i> ${currentUser.name} (${currentUser.role})</span>
                                 <button class="btn btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
            document.getElementById("logoutBtn")?.addEventListener("click", logout);
            if(currentUser.role === "admin") mainDiv.innerHTML = renderAdminDashboard();
            else mainDiv.innerHTML = renderMemberDashboard();
            attachRoleEvents();
        }
    }

    function renderPublicPage() {
        return `<div class="card" style="text-align:center;">
                    <h2 style="font-size:2rem;">💪 Selamat Datang di GymFit Pro</h2>
                    <p style="margin:16px 0;">Sistem manajemen gym modern dengan pembayaran QRIS & Cash, absensi online, dan laporan lengkap.</p>
                    <div class="stats-grid" style="margin-top:20px;">
                        <div class="stat-card"><i class="fas fa-users fa-2x"></i><div class="stat-number">+200</div><div>Member Aktif</div></div>
                        <div class="stat-card"><i class="fas fa-chalkboard-user fa-2x"></i><div class="stat-number">10+</div><div>Pelatih Profesional</div></div>
                        <div class="stat-card"><i class="fas fa-calendar-alt fa-2x"></i><div class="stat-number">20+</div><div>Kelas per Minggu</div></div>
                    </div>
                    <button class="btn btn-primary" id="demoLoginBtn">Coba Demo (member1/member123)</button>
                </div>`;
    }

    // ---------- ADMIN DASHBOARD ----------
    function renderAdminDashboard() {
        const totalMember = gymData.users.filter(u => u.role === "member").length;
        const activeMember = gymData.users.filter(u => u.role === "member" && u.status === "active").length;
        const revenue = gymData.payments.reduce((sum, p) => sum + p.amount, 0);
        const attendanceToday = gymData.attendances.filter(a => a.date === new Date().toISOString().slice(0,10)).length;
        return `
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number">${totalMember}</div><div>Total Member</div></div>
                <div class="stat-card"><i class="fas fa-user-check"></i><div class="stat-number">${activeMember}</div><div>Aktif</div></div>
                <div class="stat-card"><i class="fas fa-money-bill-wave"></i><div class="stat-number">Rp ${revenue.toLocaleString()}</div><div>Pendapatan</div></div>
                <div class="stat-card"><i class="fas fa-fingerprint"></i><div class="stat-number">${attendanceToday}</div><div>Absensi Hari Ini</div></div>
            </div>
            <div class="grid-2">
                <div class="card"><h3><i class="fas fa-chart-pie"></i> Distribusi Membership</h3><canvas id="membershipChart" height="200"></canvas></div>
                <div class="card"><h3><i class="fas fa-chart-line"></i> Pendapatan Bulanan</h3><canvas id="revenueChart" height="200"></canvas></div>
            </div>
            <div class="card">
                <div class="nav-tabs" id="adminTabs">
                    <div data-tab="members" class="tab-btn active">📋 Member</div>
                    <div data-tab="trainers" class="tab-btn">🏋️ Pelatih</div>
                    <div data-tab="schedule" class="tab-btn">📅 Jadwal</div>
                    <div data-tab="attendance" class="tab-btn">📊 Laporan Absensi</div>
                    <div data-tab="paymentReport" class="tab-btn">💰 Laporan Pembayaran</div>
                </div>
                <div id="adminTabContent"></div>
            </div>
        `;
    }

    function renderMemberList() {
        const members = gymData.users.filter(u => u.role === "member");
        return `<button id="addMemberByAdmin" class="btn btn-primary" style="margin-bottom:16px;"><i class="fas fa-plus"></i> Tambah Member</button>
                <div style="overflow-x:auto;"><table><thead><tr><th>Nama</th><th>Email</th><th>Membership</th><th>Expired</th><th>Status</th><th>Aksi</th></tr></thead><tbody>
                ${members.map(m => `<tr>
                    <td>${m.name}</td><td>${m.email}</td><td>${m.membership || '-'}</td><td>${m.expireDate || '-'}</td>
                    <td><span class="badge">${m.status}</span></td>
                    <td><button class="btn-outline btn-small resetPass" data-id="${m.id}">Reset Pass</button></td>
                </tr>`).join('')}
                </tbody></table></div>`;
    }

    function renderTrainerManagement() {
        return `<div><button id="addTrainerBtn" class="btn btn-primary">+ Tambah Pelatih</button><br><br>
                <table><thead><tr><th>Nama</th><th>Keahlian</th><th>Jadwal</th><th>Telepon</th><th>Aksi</th></tr></thead><tbody>
                ${gymData.trainers.map(t => `<tr><td>${t.name}</td><td>${t.expertise}</td><td>${t.schedule}</td><td>${t.phone}</td>
                <td><button class="btn-outline btn-small delTrainer" data-id="${t.id}">Hapus</button></td></tr>`).join('')}
                </tbody></table></div>`;
    }

    function renderScheduleManagement() {
        return `<div><button id="addScheduleBtn" class="btn btn-primary">+ Tambah Jadwal</button><br><br>
                <table><thead><tr><th>Hari</th><th>Jam</th><th>Kelas</th><th>Pelatih</th><th>Aksi</th></tr></thead><tbody>
                ${gymData.schedules.map(s => `<tr><td>${s.day}</td><td>${s.time}</td><td>${s.className}</td><td>${s.trainer}</td>
                <td><button class="btn-outline btn-small delSchedule" data-id="${s.id}">Hapus</button></td></tr>`).join('')}
                </tbody></table></div>`;
    }

    function renderAttendanceReport() {
        const list = gymData.attendances.map(att => {
            const user = gymData.users.find(u => u.id === att.userId);
            return `<tr><td>${user?.name || 'Unknown'}</td><td>${att.date}</td><td>${att.checkinTime}</td></tr>`;
        }).join('');
        return `<h4>Riwayat Absensi Member</h4><table><thead><tr><th>Member</th><th>Tanggal</th><th>Jam Check-in</th></tr></thead><tbody>${list || '<tr><td colspan="3">Belum ada data</td></tr>'}</tbody></table>`;
    }

    function renderPaymentReport() {
        const payments = gymData.payments.map(p => {
            const user = gymData.users.find(u => u.id === p.userId);
            return `<tr><td>${user?.name || '-'}</td><td>${p.date}</td><td>${p.packageId}</td><td>Rp ${p.amount.toLocaleString()}</td><td>${p.method}</td><td>${p.status}</td></tr>`;
        }).join('');
        return `<h4>Laporan Pembayaran Membership</h4><table><thead><tr><th>Member</th><th>Tgl Bayar</th><th>Paket</th><th>Nominal</th><th>Metode</th><th>Status</th></tr></thead><tbody>${payments || '<tr><td colspan="6">Belum ada</td></tr>'}</tbody></table>`;
    }

    // Grafik
    function renderCharts() {
        const members = gymData.users.filter(u => u.role === "member");
        const counts = { bulanan:0, "3bulan":0, tahunan:0, none:0 };
        members.forEach(m => {
            if(m.membership === "bulanan") counts.bulanan++;
            else if(m.membership === "3bulan") counts["3bulan"]++;
            else if(m.membership === "tahunan") counts.tahunan++;
            else counts.none++;
        });
        const ctx1 = document.getElementById("membershipChart")?.getContext("2d");
        if(ctx1) new Chart(ctx1, { type: 'doughnut', data: { labels: ['Bulanan','3 Bulan','Tahunan','Tidak Aktif'], datasets: [{ data: [counts.bulanan, counts["3bulan"], counts.tahunan, counts.none], backgroundColor: ['#22c55e','#eab308','#3b82f6','#6b7280'] }] } });
        const monthly = [0,0,0,0,0,0];
        gymData.payments.forEach(p => { let m = new Date(p.date).getMonth(); monthly[m] += p.amount; });
        const ctx2 = document.getElementById("revenueChart")?.getContext("2d");
        if(ctx2) new Chart(ctx2, { type: 'bar', data: { labels: ['Jan','Feb','Mar','Apr','Mei','Jun'], datasets: [{ label: 'Pendapatan (Rp)', data: monthly, backgroundColor: '#22c55e' }] } });
    }

    function attachAdminEvents() {
        renderCharts();
        const tabs = document.querySelectorAll("#adminTabs .tab-btn");
        const contentDiv = document.getElementById("adminTabContent");
        function loadTab(tabId) {
            if(tabId === "members") contentDiv.innerHTML = renderMemberList();
            else if(tabId === "trainers") contentDiv.innerHTML = renderTrainerManagement();
            else if(tabId === "schedule") contentDiv.innerHTML = renderScheduleManagement();
            else if(tabId === "attendance") contentDiv.innerHTML = renderAttendanceReport();
            else if(tabId === "paymentReport") contentDiv.innerHTML = renderPaymentReport();
            attachSubAdminEvents();
        }
        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                tabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                loadTab(tab.dataset.tab);
            });
        });
        loadTab("members");
    }

    function attachSubAdminEvents() {
        document.getElementById("addMemberByAdmin")?.addEventListener("click", showRegisterModal);
        document.getElementById("addTrainerBtn")?.addEventListener("click", () => {
            let name = prompt("Nama Pelatih"); let exp = prompt("Keahlian"); let sched = prompt("Jadwal"); let phone = prompt("Telepon");
            if(name) { gymData.trainers.push({ id: Date.now(), name, expertise: exp, schedule: sched, phone }); saveData(); renderApp(); }
        });
        document.querySelectorAll(".delTrainer").forEach(btn => btn.addEventListener("click", (e) => {
            gymData.trainers = gymData.trainers.filter(t => t.id != btn.dataset.id); saveData(); renderApp();
        }));
        document.getElementById("addScheduleBtn")?.addEventListener("click", () => {
            let day = prompt("Hari"); let time = prompt("Jam"); let className = prompt("Kelas"); let trainer = prompt("Pelatih");
            if(day) { gymData.schedules.push({ id: Date.now(), day, time, className, trainer }); saveData(); renderApp(); }
        });
        document.querySelectorAll(".delSchedule").forEach(btn => btn.addEventListener("click", (e) => {
            gymData.schedules = gymData.schedules.filter(s => s.id != btn.dataset.id); saveData(); renderApp();
        }));
        document.querySelectorAll(".resetPass").forEach(btn => {
            btn.addEventListener("click", () => {
                let uid = parseInt(btn.dataset.id);
                let user = gymData.users.find(u => u.id === uid);
                if(user) { user.password = "member123"; saveData(); alert("Password direset menjadi member123"); renderApp(); }
            });
        });
    }

    // ---------- MEMBER DASHBOARD ----------
    function renderMemberDashboard() {
        const member = gymData.users.find(u => u.id === currentUser.id);
        const myPayments = gymData.payments.filter(p => p.userId === currentUser.id);
        const myAttendances = gymData.attendances.filter(a => a.userId === currentUser.id);
        const today = new Date().toISOString().slice(0,10);
        const alreadyChecked = myAttendances.some(a => a.date === today);
        return `
            <div class="card"><h3><i class="fas fa-user-astronaut"></i> Hallo, ${member.name}</h3>
                <p><strong>Membership:</strong> ${member.membership || 'Belum aktif'} | <strong>Berlaku hingga:</strong> ${member.expireDate || '-'}</p>
                <button id="buyMembershipBtn" class="btn btn-primary"><i class="fas fa-credit-card"></i> Beli / Perpanjang Membership</button>
            </div>
            <div class="grid-2">
                <div class="card"><h3><i class="fas fa-calendar-alt"></i> Jadwal Latihan</h3><table><thead><tr><th>Hari</th><th>Jam</th><th>Kelas</th><th>Pelatih</th></tr></thead><tbody>
                ${gymData.schedules.map(s => `<tr><td>${s.day}</td><td>${s.time}</td><td>${s.className}</td><td>${s.trainer}</td></tr>`).join('')}
                </tbody></table></div>
                <div class="card"><h3><i class="fas fa-chalkboard-user"></i> Data Pelatih</h3><table><thead><tr><th>Nama</th><th>Keahlian</th><th>Jadwal</th></tr></thead><tbody>
                ${gymData.trainers.map(t => `<tr><td>${t.name}</td><td>${t.expertise}</td><td>${t.schedule}</td></tr>`).join('')}
                </tbody></table></div>
                <div class="card"><h3><i class="fas fa-fingerprint"></i> Absensi Hari Ini</h3>
                    ${alreadyChecked ? '<p><i class="fas fa-check-circle"></i> Anda sudah check-in hari ini.</p>' : `<button id="checkinBtn" class="btn btn-primary"><i class="fas fa-check"></i> Check-in Sekarang</button>`}
                    <p style="margin-top:12px;">Riwayat: ${myAttendances.map(a => a.date).join(', ') || 'Belum pernah absen'}</p>
                </div>
                <div class="card"><h3><i class="fas fa-history"></i> Riwayat Pembayaran</h3><table><thead><tr><th>Tgl</th><th>Paket</th><th>Nominal</th><th>Metode</th></tr></thead><tbody>
                ${myPayments.map(p => `<tr><td>${p.date}</td><td>${p.packageId}</td><td>Rp ${p.amount.toLocaleString()}</td><td>${p.method}</td></tr>`).join('') || '<tr><td colspan="4">Belum ada</td></tr>'}
                </tbody></table></div>
            </div>
        `;
    }

    function attachMemberEvents() {
        document.getElementById("buyMembershipBtn")?.addEventListener("click", showPaymentModal);
        document.getElementById("checkinBtn")?.addEventListener("click", () => {
            const today = new Date().toISOString().slice(0,10);
            const already = gymData.attendances.find(a => a.userId === currentUser.id && a.date === today);
            if(already) return alert("Sudah absen hari ini");
            gymData.attendances.push({ id: Date.now(), userId: currentUser.id, date: today, checkinTime: new Date().toLocaleTimeString() });
            saveData();
            alert("✅ Absensi berhasil!");
            renderApp();
        });
    }

    // Modal Pembayaran dengan QRIS atau Cash
    function showPaymentModal() {
        const modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3>💳 Pilih Paket Membership</h3>
                <div id="packageList" style="margin:16px 0;"></div>
                <div id="paymentMethodBox" style="display:none;">
                    <p>Pilih Metode Pembayaran:</p>
                    <button id="payQRIS" class="btn btn-primary">QRIS (Scan)</button>
                    <button id="payCash" class="btn btn-outline">Cash (Tunai)</button>
                </div>
                <div id="qrisPaymentArea" style="display:none;" class="qris-box">
                    <p>Scan QRIS berikut untuk menyelesaikan pembayaran</p>
                    <div id="qrcodeContainer"></div>
                    <button id="confirmQrisBtn" class="btn btn-primary btn-small">Konfirmasi Pembayaran QRIS</button>
                </div>
                <div id="cashPaymentArea" style="display:none;" class="qris-box">
                    <p>Pembayaran Cash: Silakan bayar ke kasir dan konfirmasi.</p>
                    <button id="confirmCashBtn" class="btn btn-primary">Konfirmasi Pembayaran Cash</button>
                </div>
                <button id="closePaymentModal" class="btn btn-outline btn-small" style="margin-top:12px;">Tutup</button>
            </div>
        `;
        document.body.appendChild(modalDiv);

        const packageContainer = modalDiv.querySelector("#packageList");
        gymData.packages.forEach(pkg => {
            const btn = document.createElement("button");
            btn.className = "btn btn-outline";
            btn.style.margin = "5px";
            btn.innerText = `${pkg.name} - Rp ${pkg.price.toLocaleString()}`;
            btn.onclick = () => {
                modalDiv.querySelector("#paymentMethodBox").style.display = "block";
                modalDiv.dataset.selectedPackage = JSON.stringify(pkg);
            };
            packageContainer.appendChild(btn);
        });

        modalDiv.querySelector("#closePaymentModal").onclick = () => modalDiv.remove();
        modalDiv.querySelector("#payQRIS").onclick = () => {
            const pkg = JSON.parse(modalDiv.dataset.selectedPackage);
            const qrArea = modalDiv.querySelector("#qrisPaymentArea");
            qrArea.style.display = "block";
            const qrContainer = modalDiv.querySelector("#qrcodeContainer");
            qrContainer.innerHTML = "";
            const orderId = "GYM"+Date.now();
            const qrText = `gymfit:${orderId}|${currentUser.name}|${pkg.name}|${pkg.price}`;
            new QRCode(qrContainer, { text: qrText, width: 160, height: 160, colorDark: "#22c55e", colorLight: "#ffffff" });
            modalDiv.querySelector("#confirmQrisBtn").onclick = () => {
                processPayment(pkg, "qris");
                modalDiv.remove();
            };
        };
        modalDiv.querySelector("#payCash").onclick = () => {
            modalDiv.querySelector("#cashPaymentArea").style.display = "block";
            modalDiv.querySelector("#confirmCashBtn").onclick = () => {
                processPayment(JSON.parse(modalDiv.dataset.selectedPackage), "cash");
                modalDiv.remove();
            };
        };
    }

    function processPayment(pkg, method) {
        const member = gymData.users.find(u => u.id === currentUser.id);
        const paymentRecord = {
            id: Date.now(),
            userId: currentUser.id,
            amount: pkg.price,
            packageId: pkg.id,
            date: new Date().toISOString().slice(0,10),
            method: method,
            status: "success"
        };
        gymData.payments.push(paymentRecord);
        // Update membership member
        member.membership = pkg.id;
        const expireDate = new Date();
        expireDate.setDate(expireDate.getDate() + pkg.days);
        member.expireDate = expireDate.toISOString().slice(0,10);
        member.status = "active";
        saveData();
        alert(`✅ Pembayaran ${method.toUpperCase()} berhasil! Membership ${pkg.name} aktif hingga ${member.expireDate}`);
        renderApp();
    }

    // Modals Login / Register
    function showLoginModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-content"><h3>Login GymFit</h3><input id="loginUser" placeholder="Username"><input id="loginPass" type="password" placeholder="Password"><br><br>
        <button id="doLogin" class="btn btn-primary">Masuk</button><button id="cancelLogin" class="btn btn-outline">Batal</button></div>`;
        document.body.appendChild(modal);
        document.getElementById("doLogin").onclick = () => {
            const uname = document.getElementById("loginUser").value;
            const pwd = document.getElementById("loginPass").value;
            if(login(uname, pwd)) { modal.remove(); renderApp(); }
            else alert("Login gagal!");
        };
        document.getElementById("cancelLogin").onclick = () => modal.remove();
    }
    function showRegisterModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-content"><h3>Pendaftaran Member Baru</h3>
        <input id="regName" placeholder="Nama Lengkap"><input id="regUser" placeholder="Username"><input id="regPass" type="password" placeholder="Password">
        <input id="regEmail" placeholder="Email"><input id="regPhone" placeholder="Telepon"><br><br>
        <button id="doReg" class="btn btn-primary">Daftar</button><button id="cancelReg" class="btn btn-outline">Batal</button></div>`;
        document.body.appendChild(modal);
        document.getElementById("doReg").onclick = () => {
            const name=document.getElementById("regName").value, user=document.getElementById("regUser").value, pass=document.getElementById("regPass").value, email=document.getElementById("regEmail").value, phone=document.getElementById("regPhone").value;
            if(!name||!user||!pass) { alert("Lengkapi data"); return; }
            if(registerMember(user, pass, name, email, phone)) { alert("Pendaftaran berhasil! Silakan login."); modal.remove(); }
            else alert("Username sudah dipakai");
        };
        document.getElementById("cancelReg").onclick = () => modal.remove();
    }

    function attachRoleEvents() {
        if(currentUser?.role === "admin") attachAdminEvents();
        else attachMemberEvents();
        const demoBtn = document.getElementById("demoLoginBtn");
        if(demoBtn) demoBtn.onclick = () => { if(login("member1","member123")) renderApp(); else alert("gagal"); };
    }

    loadData();
    renderApp();
</script>
</body>
</html>
